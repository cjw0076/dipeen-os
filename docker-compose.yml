# dipeen — 원클릭 로컬 실행
# 사용: cp .env.example .env && docker compose up
#
# 서비스 구성:
#   api       — FastAPI + SQLite  (port 8000)
#   pm-loop   — PM Agent Loop     (WS → Claude API → 태스크 생성)
#   web       — Next.js UI        (port 3000)
#
# agent-client (FE/BE/QA)는 각 개발자 PC에서 직접 실행 (opencode 필요)

services:
  # ── API 서버 ─────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - dipeen_data:/data
    environment:
      DIPEEN_DB_PATH: /data/dipeen.db
      DIPEEN_DEBUG: "${DIPEEN_DEBUG:-true}"                    # dev 기본 true — prod compose는 false+guard
      DIPEEN_SECRET_KEY: "${DIPEEN_SECRET_KEY:-dev-secret-change-me}"
      DIPEEN_CORS_ORIGINS: "${DIPEEN_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
      DIPEEN_PERMISSION_EXECUTOR_MODE: "${DIPEEN_PERMISSION_EXECUTOR_MODE:-dry_run}"   # 안전: 진짜 side effect 없음
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      DIPEEN_POLL_TIMEOUT: "${DIPEEN_POLL_TIMEOUT:-30}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── PM Agent Loop ─────────────────────────────────────────────
  pm-loop:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: python pm_loop.py
    environment:
      API_URL: "http://api:8000"
      WS_URL: "ws://api:8000"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PM_MODEL: "${PM_MODEL:-claude-sonnet-4-6}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Next.js 웹 UI ─────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8000}"
        NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dipeen_data:
