version: "3.9"

# dipeen — 프로덕션 스택
#
# 서비스 구성:
#   postgres  — PostgreSQL 15 (영속 DB)
#   redis     — Redis 7      (WS pub/sub, 캐시)
#   api       — FastAPI      (port 8000, 수평 확장 가능)
#   pm-loop   — PM Agent     (Claude API → 태스크 분해)
#   web       — Next.js      (port 3000)
#   nginx     — Reverse proxy + TLS termination (port 80/443)
#
# 사용법:
#   cp .env.example .env
#   # .env에서 필수값 설정: ANTHROPIC_API_KEY, DIPEEN_SECRET_KEY, DOMAIN
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml exec api alembic upgrade head

services:
  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dipeen
      POSTGRES_USER: dipeen
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dipeen -d dipeen"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── DB 마이그레이션 (O-4-4) ──────────────────────────────────
  migrate:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: "postgresql+asyncpg://dipeen:${POSTGRES_PASSWORD}@postgres:5432/dipeen"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── API 서버 ──────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+asyncpg://dipeen:${POSTGRES_PASSWORD}@postgres:5432/dipeen"
      REDIS_URL: "redis://redis:6379/0"
      DIPEEN_SECRET_KEY: "${DIPEEN_SECRET_KEY:?DIPEEN_SECRET_KEY required}"
      DIPEEN_DEBUG: "false"
      DIPEEN_CORS_ORIGINS: "${DIPEEN_CORS_ORIGINS:-https://${DOMAIN}}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── PM Agent Loop ─────────────────────────────────────────────
  pm-loop:
    build:
      context: ./api
      dockerfile: Dockerfile.prod
    command: python pm_loop.py
    restart: unless-stopped
    environment:
      API_URL: "http://api:8000"
      WS_URL: "ws://api:8000"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY required}"
      PM_MODEL: "${PM_MODEL:-claude-sonnet-4-6}"
      PM_AGENT_ID: "${PM_AGENT_ID:-pm-agent}"
      DIPEEN_SHARED_DIR: "/shared"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
    volumes:
      - shared_context:/shared
    depends_on:
      api:
        condition: service_healthy

  # ── Next.js 웹 UI ─────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://${DOMAIN}/api}"
        NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:-ws://${DOMAIN}}"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # ── Nginx (reverse proxy) ────────────────────────────────────
  # 도메인 + SSL 있으면: dipeen.conf (envsubst 모드)
  # IP 직접 접근 (SSL 없음): dipeen-nossl.conf (현재 설정)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d/dipeen-nossl.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

  # ── Certbot (TLS 인증서 자동 갱신) ────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # 초기 발급: docker compose run --rm certbot certonly ...
    entrypoint: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"

volumes:
  postgres_data:
  redis_data:
  shared_context:
  certbot_www:
  certbot_certs:
